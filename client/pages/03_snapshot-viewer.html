<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OptiLoad – צפייה בתמונות שלבים</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',Tahoma,Arial,sans-serif;
     direction:rtl;min-height:100vh}

header{background:#161b22;border-bottom:1px solid #30363d;padding:14px 24px;
       display:flex;align-items:center;justify-content:space-between}
header h1{font-size:18px;color:#58a6ff;font-weight:700}
header .sub{font-size:12px;color:#6e7681;margin-top:2px}
.logout-btn{background:transparent;border:1px solid #30363d;color:#8b949e;
            border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px}
.logout-btn:hover{border-color:#f85149;color:#f85149}

.toolbar{padding:16px 24px;display:flex;align-items:center;gap:12px;
         border-bottom:1px solid #21262d;flex-wrap:wrap}
.toolbar label{font-size:13px;color:#8b949e}
.toolbar input[type=number]{background:#0d1117;border:1px solid #30363d;border-radius:6px;
  color:#e6edf3;padding:6px 10px;font-size:13px;width:100px;outline:none}
.toolbar input:focus{border-color:#58a6ff}
.btn{background:#238636;border:none;color:#fff;border-radius:7px;
     padding:7px 18px;cursor:pointer;font-size:13px;font-weight:600}
.btn:hover{background:#2ea043}
.btn-secondary{background:#21262d;border:1px solid #30363d;color:#e6edf3;
               border-radius:7px;padding:7px 18px;cursor:pointer;font-size:13px}
.btn-secondary:hover{border-color:#58a6ff;color:#58a6ff}
#job-count{font-size:12px;color:#6e7681;margin-right:auto}

/* Grid */
#gallery{padding:20px 24px;display:grid;
         grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;
      overflow:hidden;transition:border-color .15s;cursor:pointer}
.card:hover{border-color:#58a6ff}
.card.selected{border-color:#f0883e;box-shadow:0 0 0 2px rgba(240,136,62,.25)}
.card img{width:100%;display:block;aspect-ratio:4/3;object-fit:cover;background:#0d1117}
.card-info{padding:10px 12px}
.card-step{font-size:11px;color:#6e7681;margin-bottom:2px}
.card-name{font-size:13px;font-weight:700;color:#e6edf3}
.card-time{font-size:10px;color:#484f58;margin-top:4px}

/* Comparison panel */
#compare-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
               z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#compare-panel.open{display:flex}
.compare-images{display:flex;gap:20px;max-width:95vw;flex-wrap:wrap;justify-content:center}
.compare-col{display:flex;flex-direction:column;align-items:center;gap:8px;max-width:45vw}
.compare-col img{max-width:100%;max-height:55vh;border-radius:8px;border:1px solid #30363d}
.compare-col .lbl{font-size:13px;color:#e6edf3;font-weight:700;text-align:center}
.compare-close{background:#21262d;border:1px solid #30363d;color:#e6edf3;
               border-radius:8px;padding:8px 24px;cursor:pointer;font-size:14px}
.compare-close:hover{border-color:#f85149;color:#f85149}
.compare-hint{font-size:12px;color:#6e7681}

/* Status */
#status-bar{padding:12px 24px;font-size:13px;color:#8b949e;min-height:40px}
.err{color:#f85149}
.ok{color:#3fb950}

/* Slideshow */
#slideshow-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);
                 z-index:200;flex-direction:column;align-items:center;justify-content:space-between;
                 padding:20px}
#slideshow-panel.open{display:flex}
#ss-image{max-width:90vw;max-height:72vh;border-radius:8px;border:1px solid #30363d}
.ss-info{text-align:center}
.ss-info h2{font-size:16px;color:#e6edf3;margin-bottom:4px}
.ss-info p{font-size:13px;color:#8b949e}
.ss-controls{display:flex;gap:16px;align-items:center}
.ss-btn{background:#21262d;border:1px solid #30363d;color:#e6edf3;
        border-radius:8px;padding:8px 20px;cursor:pointer;font-size:14px}
.ss-btn:hover{border-color:#58a6ff;color:#58a6ff}
#ss-counter{font-size:13px;color:#6e7681;min-width:80px;text-align:center}
.ss-close{position:absolute;top:16px;left:16px;background:transparent;border:none;
          color:#6e7681;font-size:22px;cursor:pointer;padding:4px 8px}
.ss-close:hover{color:#f85149}

/* Empty state */
#empty{display:none;padding:60px 24px;text-align:center;color:#6e7681;font-size:15px}
</style>
</head>
<body>

<header>
  <div>
    <h1>📸 צפייה בתמונות שלבי העמסה</h1>
    <div class="sub">OptiLoad – השוואת תמונות מול שטח</div>
  </div>
  <button class="logout-btn" onclick="logout()">← יציאה</button>
</header>

<div class="toolbar">
  <label>מספר עבודה (Job ID):</label>
  <input type="number" id="job-id-input" min="1" placeholder="לדוגמה: 5">
  <button class="btn" onclick="loadSnapshots()">טעינה</button>
  <button class="btn-secondary" onclick="loadAllJobs()">📋 כל העבודות</button>
  <div id="job-count"></div>
  <button class="btn-secondary" id="compare-mode-btn" onclick="toggleCompareMode()" style="display:none">⚖️ מצב השוואה</button>
  <button class="btn-secondary" id="slideshow-btn" onclick="startSlideshow()" style="display:none">▶ מצגת</button>
</div>

<div id="status-bar">הכנס מספר עבודה ולחץ "טעינה".</div>
<div id="empty">לא נמצאו תמונות לעבודה זו.</div>
<div id="gallery"></div>

<!-- Compare Panel -->
<div id="compare-panel">
  <div class="compare-hint">בחרת <span id="selected-count">0</span> תמונות להשוואה</div>
  <div class="compare-images" id="compare-images"></div>
  <button class="compare-close" onclick="closeCompare()">סגור</button>
</div>

<!-- Slideshow Panel -->
<div id="slideshow-panel">
  <button class="ss-close" onclick="closeSlideshow()">✕</button>
  <div class="ss-info">
    <h2 id="ss-name">—</h2>
    <p id="ss-step-label">—</p>
  </div>
  <img id="ss-image" src="" alt="">
  <div class="ss-controls">
    <button class="ss-btn" onclick="ssMove(-1)">◀ קודם</button>
    <div id="ss-counter">—</div>
    <button class="ss-btn" onclick="ssMove(1)">הבא ▶</button>
  </div>
</div>

<script>
const API = 'http://localhost:5098';
let snapshots = [];
let compareMode = false;
let selected = [];
let ssIndex = 0;

// ── Auth ──
function getToken() { return sessionStorage.getItem('optiload_token'); }
function getAuthHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() };
}
function logout() {
  sessionStorage.removeItem('optiload_token');
  location.href = 'login.html';
}
if (!getToken()) { location.href = 'login.html'; }

// ── Load snapshots for a job ──
async function loadSnapshots() {
  const jobId = parseInt(document.getElementById('job-id-input').value);
  if (!jobId) { setStatus('נא להכניס מספר עבודה.', 'err'); return; }
  setStatus('טוען תמונות...', '');
  try {
    const res = await fetch(`${API}/api/snapshots/${jobId}`, { headers: getAuthHeaders() });
    if (!res.ok) throw new Error(`שגיאת שרת: ${res.status}`);
    const data = await res.json();
    snapshots = data;
    renderGallery(data, jobId);
  } catch(e) { setStatus(e.message, 'err'); }
}

// ── Load all jobs list ──
async function loadAllJobs() {
  setStatus('מחפש את כל העבודות...', '');
  try {
    const res = await fetch(`${API}/api/packing-jobs`, { headers: getAuthHeaders() });
    if (!res.ok) throw new Error(`שגיאת שרת: ${res.status}`);
    const jobs = await res.json();
    if (!jobs.length) { setStatus('לא נמצאו עבודות.', 'err'); return; }
    // Show latest job
    const latest = jobs[jobs.length - 1];
    document.getElementById('job-id-input').value = latest.id ?? latest.jobId ?? latest.Id;
    setStatus(`נמצאו ${jobs.length} עבודות. מציג עבודה אחרונה (${latest.id ?? latest.jobId ?? latest.Id}).`, 'ok');
    loadSnapshots();
  } catch(e) {
    // If no /api/packing-jobs endpoint, try to guess recent jobs
    setStatus('נא להכניס מספר עבודה ידנית.', 'err');
  }
}

// ── Render gallery ──
function renderGallery(data, jobId) {
  const gallery = document.getElementById('gallery');
  const empty   = document.getElementById('empty');
  gallery.innerHTML = '';
  selected = [];
  compareMode = false;
  document.getElementById('compare-mode-btn').textContent = '⚖️ מצב השוואה';

  if (!data.length) {
    empty.style.display = 'block';
    setStatus(`לא נמצאו תמונות לעבודה ${jobId}.`, 'err');
    document.getElementById('compare-mode-btn').style.display = 'none';
    document.getElementById('slideshow-btn').style.display = 'none';
    document.getElementById('job-count').textContent = '';
    return;
  }

  empty.style.display = 'none';
  document.getElementById('compare-mode-btn').style.display = '';
  document.getElementById('slideshow-btn').style.display = '';
  document.getElementById('job-count').textContent = `סה"כ: ${data.length} תמונות`;
  setStatus(`נטענו ${data.length} תמונות לעבודה ${jobId}.`, 'ok');

  data.forEach((snap, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    const date = snap.createdAt ? new Date(snap.createdAt).toLocaleString('he-IL') : '';
    card.innerHTML = `
      <img src="data:image/jpeg;base64,${snap.imageData}" alt="שלב ${snap.loadingStep}" loading="lazy">
      <div class="card-info">
        <div class="card-step">שלב ${snap.loadingStep}</div>
        <div class="card-name">${snap.boxName || '—'}</div>
        <div class="card-time">${date}</div>
      </div>`;
    card.addEventListener('click', () => onCardClick(card, i));
    gallery.appendChild(card);
  });
}

// ── Card click: compare mode vs slideshow ──
function onCardClick(card, i) {
  if (compareMode) {
    const idx = selected.indexOf(i);
    if (idx >= 0) {
      selected.splice(idx, 1);
      card.classList.remove('selected');
    } else {
      if (selected.length >= 2) {
        // deselect first
        const old = document.querySelector(`.card[data-index="${selected[0]}"]`);
        if (old) old.classList.remove('selected');
        selected.shift();
      }
      selected.push(i);
      card.classList.add('selected');
    }
    if (selected.length === 2) showCompare();
  } else {
    ssIndex = i;
    openSlideshow();
  }
}

// ── Compare ──
function toggleCompareMode() {
  compareMode = !compareMode;
  selected = [];
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  document.getElementById('compare-mode-btn').textContent = compareMode ? '✕ בטל השוואה' : '⚖️ מצב השוואה';
  setStatus(compareMode ? 'בחרי 2 תמונות להשוואה.' : `${snapshots.length} תמונות.`, compareMode ? '' : 'ok');
}

function showCompare() {
  const [a, b] = selected.map(i => snapshots[i]);
  document.getElementById('selected-count').textContent = '2';
  const container = document.getElementById('compare-images');
  container.innerHTML = `
    <div class="compare-col">
      <div class="lbl">שלב ${a.loadingStep} — ${a.boxName || ''}</div>
      <img src="data:image/jpeg;base64,${a.imageData}" alt="">
    </div>
    <div class="compare-col">
      <div class="lbl">שלב ${b.loadingStep} — ${b.boxName || ''}</div>
      <img src="data:image/jpeg;base64,${b.imageData}" alt="">
    </div>`;
  document.getElementById('compare-panel').classList.add('open');
}

function closeCompare() {
  document.getElementById('compare-panel').classList.remove('open');
}

// ── Slideshow ──
function startSlideshow() { ssIndex = 0; openSlideshow(); }
function openSlideshow() {
  updateSS();
  document.getElementById('slideshow-panel').classList.add('open');
}
function closeSlideshow() {
  document.getElementById('slideshow-panel').classList.remove('open');
}
function ssMove(dir) {
  ssIndex = Math.max(0, Math.min(snapshots.length - 1, ssIndex + dir));
  updateSS();
}
function updateSS() {
  const s = snapshots[ssIndex];
  document.getElementById('ss-image').src = `data:image/jpeg;base64,${s.imageData}`;
  document.getElementById('ss-name').textContent = s.boxName || '—';
  document.getElementById('ss-step-label').textContent = `שלב ${s.loadingStep}`;
  document.getElementById('ss-counter').textContent = `${ssIndex + 1} / ${snapshots.length}`;
}

// Keyboard navigation for slideshow
document.addEventListener('keydown', e => {
  if (!document.getElementById('slideshow-panel').classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowUp') ssMove(-1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowDown') ssMove(1);
  if (e.key === 'Escape') closeSlideshow();
});

// ── Helpers ──
function setStatus(msg, type) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = type === 'err' ? 'err' : type === 'ok' ? 'ok' : '';
  el.style.padding = '12px 24px';
}
</script>
</body>
</html>
